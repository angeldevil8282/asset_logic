name: Crash Japan Daily Update

on:
  schedule:
    # 日本時間 9:15, 10:03, 12:03, 14:03, 15:15, 16:03
    - cron: '15 0 * * 1-5'
    - cron:  '3 1 * * 1-5'
    - cron:  '3 3 * * 1-5'
    - cron:  '3 5 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron:  '3 7 * * 1-5'
  workflow_dispatch:

# ここが「秩序」の守護神
concurrency:
  group: crash_jp-daily-update
  cancel-in-progress: false  # 古いジョブを殺さず、順番に処理させる（ログを重視）

permissions:
  contents: write

jobs:
  run-logic:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo'
    steps:
      - name: Show Start Time
        run: date

      - name: Checkout Logic Repo
        uses: actions/checkout@v4

      - name: Show Trigger Info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "RunID: ${{ github.run_id }}"
          echo "TriggeredAt: $(date)"

      # 1. 比較用に先にダッシュボード側を clone しておく
      - name: Clone Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${API_TOKEN}@github.com/angeldevil8282/my_dashboard.git dashboard_dest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      # 2. Python実行（dashboard_dest 内の既存データと比較するロジックを想定）
      - name: Run Script
        run: python scripts/crash_jp.py

      # 3. 差分がある場合のみ反映・ログ保存・通知を行う
      - name: Push to Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          mkdir -p dashboard_dest/crash_jp/data
          mkdir -p dashboard_dest/crash_jp/logs

          # ファイルが存在する場合のみコピーする
          [ -f daily_changes.json ] && cp daily_changes.json dashboard_dest/crash_jp/data/daily_changes.json
          [ -f summary.json ] && cp summary.json dashboard_dest/crash_jp/data/summary.json
          [ -f data/crash_jp.json ] && cp data/crash_jp.json dashboard_dest/crash_jp/data/config.json

          cd dashboard_dest

          # 存在するファイルだけを git add する
          git add crash_jp/data/*.json || true

          # 差分チェック
          if git diff --cached --quiet; then
            echo "No changes in Crash Japan data. Skipping."
            exit 0
          fi

          # ログ保存（daily_changes.json があれば）
          TIMESTAMP=$(date +'%Y-%m-%d_%H%M%S')
          if [ -f crash_jp/data/daily_changes.json ]; then
            cp crash_jp/data/daily_changes.json crash_jp/logs/changes_${TIMESTAMP}.json
          fi

          # コミットとプッシュ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Crash Japan Auto Update: ${TIMESTAMP}"
          git pull --rebase origin main
          git push || (sleep 10 && git pull --rebase origin main && git push)

          # --- 通知セクションの jq もファイルがないとエラーになるので修正 ---
          # daily_changes.json から情報を取るように変更
          STOCKS_INFO=$(jq -r '.stocks[] | "- \(.name): \(.change_pct)% (\(.current_price)円)"' crash_jp/data/daily_changes.json | head -n 5)
          
          RUN_NUM=${{ github.run_number }}
          TRIGGER_TYPE="${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Scheduled' }}"

          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"⚠️ **日本株 暴落監視 [#${RUN_NUM}]**\n種別: **${TRIGGER_TYPE}**\n\n${STOCKS_INFO}\n\n時刻: $(date +'%H:%M')\n🔗 https://angeldevil8282.github.io/my_dashboard/crash_jp/\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Show End Time
        run: date
