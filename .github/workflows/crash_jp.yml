name: Crash Japan Daily Update

on:
  schedule:
    - cron: '15 0 * * 1-5'
    - cron:  '3 1 * * 1-5'
    - cron:  '3 3 * * 1-5'
    - cron:  '3 5 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron:  '3 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: crash_jp-daily-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-logic:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo'
    steps:
      - name: Show Start Time
        run: date

      - name: Checkout Logic Repo
        uses: actions/checkout@v4

      - name: Clone Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${API_TOKEN}@github.com/angeldevil8282/my_dashboard.git dashboard_dest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Run Script
        run: |
          rm -f daily_changes.json
          python scripts/crash_jp.py
          # もしスクリプトが別の場所に吐いている場合に備えた保険
          find . -maxdepth 2 -name "daily_changes.json" -exec cp {} . \;

      - name: Push to Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 1. 宛先フォルダを作る
          mkdir -p dashboard_dest/crash_jp/data
          mkdir -p dashboard_dest/crash_jp/logs
          
          # 2. 生成されたファイルを配送（cdする前にコピーするのがコツです）
          if [ -f daily_changes.json ]; then
            cp daily_changes.json dashboard_dest/crash_jp/data/daily_changes.json
            echo "File copied successfully."
          else
            echo "Error: daily_changes.json not found!"
            exit 1
          fi

          # 設定ファイルなども同期（cdする前に実行）
          [ -f data/crash_jp.json ] && cp data/crash_jp.json dashboard_dest/crash_jp/data/config.json

          # 3. 反映処理（ここで移動する）
          cd dashboard_dest
          git add crash_jp/data/*.json || true

          # 差分チェック
          FILE_SIZE=$(stat -c%s "crash_jp/data/daily_changes.json" || echo 0)
          if ! git diff --cached --quiet || [ "$FILE_SIZE" -le 10 ]; then
            TIMESTAMP=$(date +'%Y-%m-%d_%H%M%S')
            cp crash_jp/data/daily_changes.json crash_jp/logs/changes_${TIMESTAMP}.json
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Crash Japan Auto Update: ${TIMESTAMP}"
            git pull --rebase origin main
            git push || (sleep 10 && git pull --rebase origin main && git push)
          else
            echo "No changes in Crash Japan data. Skipping push."
          fi

          # --- 通知セクション（パスをdashboard_dest配下に合わせる） ---
        # STOCKS_INFO=$(jq -r '.stocks[] | "- \(.name): \(.change_pct)% (\(.current_price)円)"' crash_jp/data/daily_changes.json)
        # UPDATE_TIME=$(jq -r '.date' crash_jp/data/daily_changes.json)
        # RUN_NUM=${{ github.run_number }}
        # TRIGGER_TYPE="${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Scheduled' }}"

        # curl -H "Content-Type: application/json" \
        #      -d "{\"content\": \"⚠️ **日本株 暴落監視 [#${RUN_NUM}]**\n種別: **${TRIGGER_TYPE}**\n\n${STOCKS_INFO}\n\n時刻: ${UPDATE_TIME}\n🔗 https://angeldevil8282.github.io/my_dashboard/crash_jp/\"}" \
        #      $DISCORD_WEBHOOK_URL

          # --- 通知セクション ---
          # Pythonが吐き出したJSONをそのまま送信する
          if [ -f discord_msg.json ]; then
            curl -H "Content-Type: application/json" \
                 -d @discord_msg.json \
                 $DISCORD_WEBHOOK_URL
          fi

      - name: Show End Time
        run: date
