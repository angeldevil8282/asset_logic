name: Crash Japan Daily Update

on:
  schedule:
                               # 日本時間 9:15, 10:03, 12:03, 14:03, 15:15, 16:03
  # - cron: '15  0 * * 1-5'    # 日本時間 09:15⇒(実績)19:08 20:50 15:20 18:47
  # - cron:  '3  1 * * 1-5'    # 日本時間 10:03⇒(実績)19:17 21:28 16:02 19:09
  # - cron:  '3  3 * * 1-5'    # 日本時間 12:03⇒(実績)20:27 22:35 17:15 19:55
  # - cron:  '3  5 * * 1-5'    # 日本時間 14:03⇒(実績)21:24 23:10 19:10 20:30
  # - cron: '15  6 * * 1-5'    # 日本時間 15:15⇒(実績)21:31 25:19 19:56 21:22
  # - cron:  '3  7 * * 1-5'    # 日本時間 16:03⇒(実績)22:27 25:49 20:56 22:20

    - cron: '18  0 * * 0-5'    # 日本時間 09:03⇒(想定)15:30(15:30) 6-8時間遅れ想定
    - cron: '18  1 * * 0-5'    # 日本時間 10:03⇒(想定)16:30(16:30) 6-8時間遅れ想定
    - cron: '18  3 * * 0-5'    # 日本時間 12:03⇒(想定)18:30(18:30) 6-8時間遅れ想定
  # - cron: '18  9 * * 1-5'    # 日本時間 18:03⇒(想定)24:30-22:30  6-8時間遅れ想定
  # - cron: '18 11 * * 0-5'    # 日本時間 20:03⇒(想定)26:30(02:30) 6-8時間遅れ想定
  # - cron: '18 13 * * 0-5'    # 日本時間 22:03⇒(想定)28:30(04:30) 6-8時間遅れ想定
  # - cron: '18 15 * * 0-5'    # 日本時間 24:03⇒(想定)30:30(06:30) 6-8時間遅れ想定
  # - cron: '18 16 * * 0-5'    # 日本時間 01:15⇒(想定)31:30(07:30) 6-8時間遅れ想定
    - cron: '18 17 * * 0-5'    # 日本時間 02:03⇒(想定)32:30(08:30) 6-8時間遅れ想定
    - cron: '18 18 * * 0-5'    # 日本時間 03:03⇒(想定)33:30(09:30) 6-8時間遅れ想定
    - cron: '18 19 * * 0-5'    # 日本時間 04:03⇒(想定)34:30(10:30) 6-8時間遅れ想定
    - cron: '18 20 * * 0-5'    # 日本時間 05:03⇒(想定)35:30(11:30) 6-8時間遅れ想定
    - cron: '18 21 * * 0-5'    # 日本時間 06:03⇒(想定)36:30(12:30) 6-8時間遅れ想定
    - cron: '18 22 * * 0-5'    # 日本時間 07:03⇒(想定)37:30(13:30) 6-8時間遅れ想定
    - cron: '18 23 * * 0-5'    # 日本時間 08:03⇒(想定)38:30(14:30) 6-8時間遅れ想定
  workflow_dispatch:
  workflow_call:  # 呼び出し可能
  
concurrency:
  group: crash_jp-daily-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-logic:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo'
    steps:
      - name: Show Start Time
        run: date

      - name: Checkout Logic Repo
        uses: actions/checkout@v4

      - name: Clone Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${API_TOKEN}@github.com/angeldevil8282/my_dashboard.git dashboard_dest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Run Script
        run: |
          rm -f daily_changes.json discord_msg.json
          python scripts/crash_jp.py
          # 階層がズレていてもカレントに回収する
          find . -maxdepth 2 -name "daily_changes.json" -exec cp {} . \;
          find . -maxdepth 2 -name "discord_msg.json" -exec cp {} . \;

      - name: Push to Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # 1. 宛先フォルダ準備
          mkdir -p dashboard_dest/crash_jp/data
          mkdir -p dashboard_dest/crash_jp/logs
          
          # 2. ファイル配送
          if [ -f daily_changes.json ]; then
            cp daily_changes.json dashboard_dest/crash_jp/data/daily_changes.json
            echo "File copied successfully."
          else
            echo "Error: daily_changes.json not found!"
            exit 1
          fi

          [ -f data/crash_jp.json ] && cp data/crash_jp.json dashboard_dest/crash_jp/data/config.json

          # 3. 反映処理
          cd dashboard_dest
          git add crash_jp/data/*.json || true

          FILE_SIZE=$(stat -c%s "crash_jp/data/daily_changes.json" || echo 0)
          if ! git diff --cached --quiet || [ "$FILE_SIZE" -le 10 ]; then
            TIMESTAMP=$(date +'%Y-%m-%d_%H%M%S')
            cp crash_jp/data/daily_changes.json crash_jp/logs/changes_${TIMESTAMP}.json
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Crash Japan Auto Update: ${TIMESTAMP}"
            git pull --rebase origin main
            git push || (sleep 10 && git pull --rebase origin main && git push)
          else
            echo "No changes in data. Skipping push."
          fi

          # 4. 通知セクション（dashboard_destの外にあるdiscord_msg.jsonを参照）
          cd ..
          if [ -f discord_msg.json ]; then
            curl -H "Content-Type: application/json" \
                 -d @discord_msg.json \
                 $DISCORD_WEBHOOK_URL
          else
            echo "Notification skipped: discord_msg.json not found."
          fi

      - name: Show End Time
        run: date
