name: Daily Asset Update Logic v2

on:
  schedule:
    # 日本時間 9:15, 10:03, 12:03, 14:03, 15:15, 16:03
    - cron: '15 0 * * 1-5'
    - cron:  '3 1 * * 1-5'
    - cron:  '3 3 * * 1-5'
    - cron:  '3 5 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron:  '3 7 * * 1-5'
  workflow_dispatch:

# ここが「秩序」の守護神
concurrency:
  group: sbi-daily-update
  cancel-in-progress: false  # 古いジョブを殺さず、順番に処理させる（ログを重視）

permissions:
  contents: write

jobs:
  run-logic:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo'
    steps:
      - name: Show Start Time
        run: date

      - name: Checkout Logic Repo
        uses: actions/checkout@v4

      - name: Show Trigger Info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "RunID: ${{ github.run_id }}"
          echo "TriggeredAt: $(date)"

      # 1. 比較用に先にダッシュボード側を clone しておく
      - name: Clone Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${API_TOKEN}@github.com/angeldevil8282/my_dashboard.git dashboard_dest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      # 2. Python実行（dashboard_dest 内の既存データと比較するロジックを想定）
      - name: Run Script
        run: python scripts/update_assets.py

      # 3. 差分がある場合のみ反映・ログ保存・通知を行う
      - name: Push to Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          # 保存先ディレクトリの作成（念のため）
          mkdir -p dashboard_dest/sbi/logs

          # 最新ファイルを sbi/ 配下にコピー
          [ -f results.json ] && cp results.json dashboard_dest/sbi/data/daily_changes.json
          [ -f summary.json ] && cp summary.json dashboard_dest/sbi/data/summary.json
          # 銘柄リストも同期させておく（マスター管理のため）
          cp data/stocks.json dashboard_dest/sbi/data/config.json

          cd dashboard_dest

          # sbi/ 以下の変更をステージング
          git add sbi/data/daily_changes.json sbi/data/summary.json sbi/data/config.json

          # 差分がない場合は終了
          if git diff --cached --quiet; then
            echo "No changes in SBI logic. Skipping."
            exit 0
          fi

          # 差分あり：ログ保存（sbi/logs/ 配下へ）
          TIMESTAMP=$(date +'%Y-%m-%d_%H%M%S')
          cp sbi/data/daily_changes.json sbi/logs/changes_${TIMESTAMP}.json
          cp sbi/data/summary.json sbi/logs/summary_${TIMESTAMP}.json

          # コミットとプッシュ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sbi/logs/
          git commit -m "SBI Auto Update: ${TIMESTAMP}"

          git pull --rebase origin main
          git push || (sleep 10 && git pull --rebase origin main && git push)

          # 通知用のデータ取得（パスに注意）
          PRED=$(jq -r '.prediction' sbi/data/summary.json)
          COV=$(jq -r '.coverage' sbi/data/summary.json)
          
          # curl -H "Content-Type: application/json" \
          #      -d "{\"content\": \"📈 **SBI高配当 予測更新**\n予測値: **${PRED}%**\n有効銘柄: ${COV}\n時刻: $(date +'%H:%M')\"}" \
          #      ${{ secrets.DISCORD_WEBHOOK_URL }}

          # --- 修正後の通知コマンド案 ---
          RUN_NUM=${{ github.run_number }}
          TRIGGER_TYPE="${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Scheduled' }}"

          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"📈 **SBI高配当 予測更新 [#${RUN_NUM}]**\n種別: **${TRIGGER_TYPE}**\n予測値: **${PRED}%**\n有効銘柄: ${COV}\n時刻: $(date +'%H:%M')\n\n🔗 **Dashboard:**\nhttps://angeldevil8282.github.io/my_dashboard/sbi/\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Show End Time
        run: date
