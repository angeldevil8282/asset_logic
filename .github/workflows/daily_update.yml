name: Daily Asset Update Logic

on:
  schedule:
    # JST 12:00, 15:15, 15:25 (UTCでは 3:00, 6:15, 6:25)
    - cron: '0 3 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '25 6 * * 1-5'
    - cron: '00 7 * * 1-5'
  workflow_dispatch: # 手動実行ボタン

jobs:
  run-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Logic Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

        # ↓ ここを追加
      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Run Script
        # ここで計算を実行し、結果を results.json に書き出す想定です
        run: python scripts/update_assets.py

      - name: Push to Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          # 公開リポジトリをクローン
          git clone https://x-access-token:${API_TOKEN}@github.com/angeldevil8282/my_dashboard.git dashboard_dest
          
          # 計算結果（results.json）を公開リポジトリの daily_changes.json に上書き
          # ※まだファイルがないとエラーになるので、一旦ダミー作成も兼ねる
          cp results.json dashboard_dest/daily_changes.json || echo "{}" > dashboard_dest/daily_changes.json
          
          cd dashboard_dest
          git config user.name "Asset-Bot"
          git config user.email "bot@example.com"
          git add daily_changes.json
          git commit -m "Automated update: $(date)" || exit 0
          git push
