name: Daily Asset Update Logic v2

on:
  schedule:
    # 実行タイミング（UTC）: 日本時間の 9:15, 10:00, 12:00, 14:00, 15:15, 15:25, 16:00
    - cron: '15 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '0 3 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '25 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-logic:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo' # このジョブ全体を日本時間基準にする
    steps:
      - name: Show Start Time
        run: date

      - name: Checkout Logic Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Run Script
        run: python scripts/update_assets.py

      - name: Push to Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${API_TOKEN}@github.com/angeldevil8282/my_dashboard.git dashboard_dest
          
          cd dashboard_dest
          # 強制的にダミーファイルを作成して差分を作る
          echo "Force Update: $(date)" > debug.txt
          
          git config user.name "Asset-Bot"
          git config user.email "bot@example.com"
          git add debug.txt
          git commit -m "Token Test: $(date)"
          git push
          
      - name: Show End Time
        run: date
