name: Daily Asset Update Logic v2

on:
  schedule:
    # 実行タイミング（UTC）: 日本時間の 9:15, 10:03, 12:03, 14:03, 15:13, 15:23, 16:03
    - cron: '15 0 * * 1-5'
    - cron: '3 1 * * 1-5'
    - cron: '3 3 * * 1-5'
    - cron: '3 5 * * 1-5'
    - cron: '13 6 * * 1-5'
    - cron: '23 6 * * 1-5'
    - cron: '3 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-logic:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Tokyo' # このジョブ全体を日本時間基準にする
    steps:
      - name: Show Start Time
        run: date

      - name: Checkout Logic Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests

      - name: Run Script
        run: python scripts/update_assets.py

      - name: Push to Dashboard Repo
        env:
          API_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${API_TOKEN}@github.com/angeldevil8282/my_dashboard.git dashboard_dest
          
          # 1. 新しいデータをコピー（results.jsonはPythonスクリプトが生成した最新版）
          cp results.json dashboard_dest/daily_changes.json || echo "{}" > dashboard_dest/daily_changes.json

          cd dashboard_dest

          # 2. ステージングしてから差分チェック
          git add daily_changes.json

          if git diff --cached --quiet; then
            echo "No changes detected. Skipping update."
            exit 0
          fi

          # 3. 差分あり：ログ保存とコミット
          mkdir -p logs
          FILENAME=$(date +'%Y-%m-%d_%H%M%D').json
          cp daily_changes.json logs/${FILENAME}

          # --- ここにDiscord通知を追加 ---
          curl -H "Content-Type: application/json" \
               -d "{\"content\": \"✅ **資産データ更新完了**\n時刻: $(date +'%Y-%m-%d %H:%M')\nリポジトリ: my_dashboard にログを保存しました。\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
          # ----------------------------

          git config user.name "Asset-Bot"
          git config user.email "bot@example.com"
          git add logs/
          git commit -m "Automated update: $(date)"
          git push
          
      - name: Show End Time
        run: date
